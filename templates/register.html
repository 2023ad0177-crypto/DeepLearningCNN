<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Healthcare AI - Register</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #0f9d58, #34c38f, #e6f7ff);
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(20px);
    padding: 40px;
    border-radius: 20px;
    width: 420px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}

.card h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #0f9d58;
}

.server-error {
    color: #e74c3c;
    font-size: 13px;
    text-align: center;
    margin-bottom: 10px;
}

.input-group {
    position: relative;
    margin-bottom: 15px;
}

.input-group i {
    position: absolute;
    top: 13px;
    left: 12px;
    color: #0f9d58;
}

.input-group input,
.input-group select {
    width: 100%;
    padding: 12px 12px 12px 38px;
    border: 1px solid #ddd;
    border-radius: 10px;
    outline: none;
}

.input-group input:focus,
.input-group select:focus {
    border-color: #0f9d58;
    box-shadow: 0 0 8px rgba(15,157,88,0.3);
}

button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(90deg, #0f9d58, #20c997);
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: linear-gradient(90deg, #0c7c46, #17a2b8);
}

.error {
    color: #e74c3c;
    font-size: 12px;
    margin-bottom: 8px;
}

.footer {
    text-align: center;
    margin-top: 15px;
    font-size: 13px;
}

.footer a {
    color: #0f9d58;
    font-weight: bold;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="card">

    <h2>🧠 Healthcare Registration</h2>

    {% if error %}
        <div class="server-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('register') }}" onsubmit="return validateForm()">

        <div class="input-group">
            <i class="fa fa-user"></i>
            <input type="text" id="name" name="name" placeholder="Name" required>
        </div>
        <div class="error" id="nameError"></div>

        <div class="input-group">
            <i class="fa fa-calendar"></i>
            <input type="number" id="age" name="age" placeholder="Age" required>
        </div>
        <div class="error" id="ageError"></div>

        <div class="input-group">
            <i class="fa fa-venus-mars"></i>
            <select id="gender" name="gender" required>
                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>
            </select>
        </div>

        <!-- 🔥 ROLE ADDED HERE -->
        <div class="input-group">
            <i class="fa fa-user-shield"></i>
            <select id="role" name="role" required>
                <option value="">Select Role</option>
                <option value="patient">Patient</option>
                <option value="doctor">Doctor</option>
                <option value="admin">Admin</option>
            </select>
        </div>

        <div class="input-group">
            <i class="fa fa-hospital"></i>
            <input type="text" id="hospital" name="hospital" placeholder="Hospital Name" required>
        </div>

        <div class="input-group">
            <i class="fa fa-envelope"></i>
            <input type="email" id="email" name="email" placeholder="Email" required>
        </div>

        <div class="input-group">
            <i class="fa fa-lock"></i>
            <input type="password" id="password" name="password" placeholder="Password" required>
        </div>

        <div class="input-group">
            <i class="fa fa-lock"></i>
            <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
        </div>

        <button type="submit">
            <i class="fa fa-user-plus"></i> Create Account
        </button>
    </form>

    <div class="footer">
        Already have an account?
        <a href="{{ url_for('login') }}">Login</a>
    </div>

</div>

<script>
function validateForm() {
    let password = document.getElementById("password").value;
    let confirm = document.getElementById("confirmPassword").value;

    if (password !== confirm) {
        alert("Passwords do not match");
        return false;
    }
    return true;
}
</script>

</body>
</html>
